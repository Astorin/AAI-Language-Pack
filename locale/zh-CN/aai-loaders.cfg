[mod-setting-name]
aai-loaders-mode=操作模式
aai-loaders-lubricant-recipe=添加润滑油配方
aai-loaders-fit-assemblers=适配组装机
aai-loaders-belt-stacking-mode=堆叠模式[space-age]

[mod-setting-description]
aai-loaders-mode=确定AAI装卸机在游戏中的工作方式。推荐使用润滑模式；否则，即使成本很高，装卸机也比机械臂有太多优势。
aai-loaders-lubricant-recipe=是否添加一种简单但效率低下的配方，允许直接从原油中生产润滑剂。\n\n默认设置为“自动”，如果高等原油处理和将重油转化为润滑油的配方没有改变，将有条件地启用此配方。 如果将操作模式设置设置为“润滑”，则此设置不起任何作用。
aai-loaders-fit-assemblers=组装机的大小增加8%，使装卸机的图形连接正常。
aai-loaders-belt-stacking-mode=如果传送带没有堆叠功能，该设置无效果。

[string-mod-setting]
aai-loaders-mode-lubricated=润滑
aai-loaders-mode-expensive=昂贵（不使用液体）
aai-loaders-mode-graphics-only=仅图形
aai-loaders-lubricant-recipe-auto=自动
aai-loaders-lubricant-recipe-enabled=已启用
aai-loaders-lubricant-recipe-disabled=禁用
aai-loaders-belt-stacking-mode-off=关闭
aai-loaders-belt-stacking-mode-opt-in=主动
aai-loaders-belt-stacking-mode-opt-out=被动

[string-mod-setting-description]
aai-loaders-mode-lubricated=平衡液体成本和物流能力。
aai-loaders-mode-expensive=平衡前期成本。不使用液体。
aai-loaders-mode-graphics-only=游戏性不变。只为其他模组提供图形。
aai-loaders-lubricant-recipe-auto=如果原版的高等原油处理和润滑油配方没有改变，则添加从原油制作润滑油的配方。
aai-loaders-lubricant-recipe-enabled=启用额外的原油-润滑油配方。
aai-loaders-lubricant-recipe-disabled=禁用额外的原油-润滑油配方。
aai-loaders-belt-stacking-mode-off=禁用堆叠。(重置任何传送带堆叠)
aai-loaders-belt-stacking-mode-opt-in=启用堆叠，但装卸机默认不堆叠。
aai-loaders-belt-stacking-mode-opt-out=启用堆叠，装卸机默认堆叠。

[recipe-name]
lubricant-from-crude-oil=原油制润滑油

